<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Basic Challenges: Challenge 1</title>
</head>
<body>
    <h1>JavaScript Basic Challenges</h1>
    <h2>Challenge 1</h2>
    <script>
        var selectedColor = prompt("Enter a primary or secondary color","").toLowerCase();
        if (selectedColor === "red" || selectedColor === "blue" || selectedColor === "yellow") {
            console.log(`you chose a primary color`);
        } else if (selectedColor === "orange" || selectedColor === "green" || selectedColor === "purple") {
            console.log(`you chose a secondary color`);
        }
        else {
            console.log(`you didn't choose a primary or secondary color`);
        }
    </script>
</body>
</html>
