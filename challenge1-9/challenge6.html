<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Basic Challenges: Challenge 1</title>
</head>
<body>
    <h1>JavaScript Basic Challenges</h1>
    <h2>Challenge 1</h2>
    <script>
        var UserNum = prompt("Enter a whole number:","");
        if (UserNum < 9) {
            console.log(`you entered a number less than 10`);
        } else if (UserNum > 9) {
            console.log(`you entered a big number`);
        }
        else {
            console.log(`ERROR: you didn't enter a number!`);
        }
    </script>
</body>
</html>
