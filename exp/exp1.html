<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 1</title>
</head>
<body>
    <h1>Look in the console to see the results</h1>
    <script>

        //sequence step 1
        var myText = `Watch out the falling Apples`;
        //sequence step 2
        var newString = ``;
        //sequence step 3
        console.log(myText);

        //sequence step 4 run a loop
        for (var i = 0; i < myText.length; i++) {

            //sequence step 5 have a selection
            if (myText[i] === 'a') {
                newString += myText[i].toUpperCase();
            }
            
            else {
                newString += myText[i];
            }
        }
        //sequence step 6 print out the final string
        console.log(newString);


        var text = newString;
        text = text.replaceAll("Apples","KaCa");
        text = text.replaceAll("apples","kcCa");
        console.log(text);


    </script>

</body>
</html>
