<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Functions in JavaScript</title>
</head>
<body>
    <h1>Creating Functions in JavaScript</h1>
    <script>
        function doStuff() {
            var myString = "here is a message";
            var upperString = myString.toUpperCase();
            console.log(myString);
            console.log(upperString);
        }

        doStuff();

        function checkNum(){
            var userNum = prompt("Enter a whole number", "");
            if (userNum < 10){
                console.log("you entered a number less than 10");
                for(var i = 0; i <= userNum; i++){
                console.log(`Here is the number: ${i}`);
            } 
            } else if( userNum > 9){
                console.log("you entered a big number");
            } else {
                console.log("ERROR: you didn't enter a number!");
            }
        }
        checkNum();

        function upperMessage(message){
            var upper = message.toUpperCase();
            console.log(upper);
        }
        upperMessage("an important message!");

        function addNums(num1, num2){
            var sum = num1 + num2;
            console.log(sum);
        }
        addNums(4, 3);

        function returnSum(num1, num2){
            var sum = num1 + num2;
            return sum;
        }
        console.log(returnSum(5, 3));

        function randomInt(min, max){
            var numOfValues =max - min + 1;
            console.log(numOfValues);

            randomInt(5, 10);
        }

        function randomInt(min, max){
            var numOfValues =max - min + 1;
            var randomNum = Math.random() ;
            var randomVal = randomNum * numOfValues;
            console.log(randomVal);
        }
        randomInt(5, 10);

        function randomInt(min, max){
            var numOfValues =max - min + 1;
            var randomNum = Math.random() ;
            var randomVal = randomNum * numOfValues;
            var roundedRandomVal = Math.floor(randomVal);
            console.log(roundedRandomVal);
        }
        randomInt(5, 10);

        function randomInt(min, max){
            var numOfValues =max - min + 1;
            var randomNum = Math.random() ;
            var randomVal = randomNum * numOfValues;
            var roundedRandomVal = Math.floor(randomVal);
            var finalNum = roundedRandomVal + min;
            console.log(finalNum);
        }
        randomInt(5, 10);

        var food = ["cheese","fruit","chicken","pie"];
        function randomInt(min, max){
            var numOfValues =max - min + 1;
            var randomNum = Math.random() ;
            var randomVal = randomNum * numOfValues;
            var roundedRandomVal = Math.floor(randomVal);
            var finalNum = roundedRandomVal + min;
            return finalNum;
        }
        console.log( food[randomInt( 0, 3)])

        var food = ["cheese","fruit","chicken","pie"];
        function randomInt(min, max){
            return Math.floor((max-min+1)*Math.random())+ min;
        }
        console.log( food[randomInt( 0, 3)]);

        var greeting = function(){
            var name = prompt("Please tell me your name","");
            console.log(`Hello ${name}, how are you today?`);
        }
        greeting();
    </script>
</body>
</html>
